<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Inbox</title>

<style>

body{
font-family:Arial;
background:#f6e3e8;
margin:0;
}

header{
background:#ff4f87;
color:white;
padding:18px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:15px;
margin-bottom:20px;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
}

input{
width:100%;
padding:12px;
border-radius:8px;
border:1px solid #ddd;
margin:10px 0;
}

button{
background:#ff4f87;
color:white;
border:none;
padding:12px;
width:100%;
border-radius:10px;
cursor:pointer;
}

.message{
background:#f3e2e7;
padding:15px;
border-radius:10px;
margin-bottom:10px;
}

</style>

</head>

<body>

<header>
<div>Your Feedbacks 💌</div>
<div>Logout</div>
</header>

<div class="container">

<div class="card">

<h3>Your feedback link</h3>

<input value="https://sayitcutie.github.io/send.html" readonly>

<button>Copy link</button>

</div>


<div class="card">

<h3>Messages</h3>

<div class="message">Hello</div>
<div class="message">Hey u</div>
<div class="message">Hola</div>

</div>

</div>

</body>
</html>
