<!DOCTYPE html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Send feedback</title>

<style>

body{
font-family:Arial;
background:#f6e3e8;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.card{
background:white;
padding:30px;
border-radius:20px;
width:330px;
text-align:center;
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

h2{
margin-bottom:10px;
}

p{
color:#777;
font-size:14px;
}

textarea{
width:100%;
height:120px;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
margin-top:20px;
resize:none;
}

button{
margin-top:20px;
width:100%;
padding:15px;
background:#ff4f87;
border:none;
border-radius:12px;
color:white;
font-size:16px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<h2>Send anonymous feedback 🎀</h2>

<p>Your message will be completely anonymous</p>

<textarea placeholder="Say something nice..."></textarea>

<button>Send</button>

</div>

</body>
</html>
