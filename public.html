<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Send Feedback</title>
</head>

<body>

<div class="card">

  <h1>Send anonymous feedback 🎀</h1>
  <p class="muted">Your message will be completely anonymous</p>

  <textarea id="message" maxlength="300" placeholder="Say something nice..."></textarea>
  <p id="count" class="muted">0 / 300</p>

  <button id="sendBtn" class="primary">Send</button>

</div>

<script type="module" src="public.js"></script>

</body>
</html>
